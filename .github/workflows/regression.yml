name: Regression Gate

on:
  pull_request:
  push:
    branches:
      - main
      - master
      - "codex/**"

jobs:
  regression:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Run unit tests
        run: |
          python -m unittest discover -s tests

      - name: Run regression quality gate
        run: |
          python scripts/run_regression.py --mode mock --min-pass-rate 0.9 --fail-on-errors

      - name: Run distributed queue stability smoke
        run: |
          python scripts/run_stability_validation.py queue --jobs 80 --workers 3 --backend sqlite --failure-ratio 0.1 --max-retries 2
