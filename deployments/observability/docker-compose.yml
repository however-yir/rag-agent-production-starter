services:
  redis:
    image: redis:7.2-alpine
    ports:
      - "6379:6379"

  app:
    build:
      context: ../..
      dockerfile: deployments/Dockerfile
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000"]
    environment:
      APP_HOST: "0.0.0.0"
      APP_PORT: "8000"
      DATABASE_PATH: "/data/rag_agent.db"
      USE_MOCK_SERVICES: "${USE_MOCK_SERVICES:-true}"
      SECURITY_ENABLED: "false"
      LOG_LEVEL: "INFO"
      LOG_JSON: "true"
      INGESTION_QUEUE_BACKEND: "redis"
      INGESTION_EMBEDDED_WORKER_ENABLED: "false"
      REDIS_URL: "redis://redis:6379/0"
      OPEN_TELEMETRY_ENABLED: "true"
      OPEN_TELEMETRY_LOGS_ENABLED: "true"
      OTEL_EXPORTER_OTLP_ENDPOINT: "http://otel-collector:4318/v1/traces"
      OTEL_EXPORTER_OTLP_LOGS_ENDPOINT: "http://otel-collector:4318/v1/logs"
      OTEL_SERVICE_NAME: "rag-react-agent-api"
      OTEL_SERVICE_ENV: "staging"
      OPENAI_API_KEY: "${OPENAI_API_KEY:-}"
      TAVILY_API_KEY: "${TAVILY_API_KEY:-}"
      PINECONE_API_KEY: "${PINECONE_API_KEY:-}"
    ports:
      - "8000:8000"
    volumes:
      - rag_data:/data
    depends_on:
      - redis
      - otel-collector

  worker:
    build:
      context: ../..
      dockerfile: deployments/Dockerfile
    command: ["python", "scripts/run_worker.py"]
    environment:
      DATABASE_PATH: "/data/rag_agent.db"
      USE_MOCK_SERVICES: "${USE_MOCK_SERVICES:-true}"
      SECURITY_ENABLED: "false"
      LOG_LEVEL: "INFO"
      LOG_JSON: "true"
      INGESTION_QUEUE_BACKEND: "redis"
      INGESTION_EMBEDDED_WORKER_ENABLED: "false"
      REDIS_URL: "redis://redis:6379/0"
      OPEN_TELEMETRY_ENABLED: "true"
      OPEN_TELEMETRY_LOGS_ENABLED: "true"
      OTEL_EXPORTER_OTLP_ENDPOINT: "http://otel-collector:4318/v1/traces"
      OTEL_EXPORTER_OTLP_LOGS_ENDPOINT: "http://otel-collector:4318/v1/logs"
      OTEL_SERVICE_NAME: "rag-react-agent-worker"
      OTEL_SERVICE_ENV: "staging"
      OPENAI_API_KEY: "${OPENAI_API_KEY:-}"
      TAVILY_API_KEY: "${TAVILY_API_KEY:-}"
      PINECONE_API_KEY: "${PINECONE_API_KEY:-}"
    volumes:
      - rag_data:/data
    depends_on:
      - redis
      - otel-collector

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.103.1
    command: ["--config=/etc/otelcol-contrib/config.yaml"]
    volumes:
      - ./otel-collector-config.yaml:/etc/otelcol-contrib/config.yaml:ro
    ports:
      - "4317:4317"
      - "4318:4318"
      - "9464:9464"

  jaeger:
    image: jaegertracing/all-in-one:1.58
    ports:
      - "16686:16686"
      - "14268:14268"
      - "4318:4318"

  prometheus:
    image: prom/prometheus:v2.53.1
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
    volumes:
      - ./prometheus.yaml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"
    depends_on:
      - app
      - otel-collector

  loki:
    image: grafana/loki:3.1.1
    command: ["-config.file=/etc/loki/local-config.yaml"]
    volumes:
      - ./loki-config.yaml:/etc/loki/local-config.yaml:ro
    ports:
      - "3100:3100"

  grafana:
    image: grafana/grafana:11.1.5
    environment:
      GF_SECURITY_ADMIN_USER: "admin"
      GF_SECURITY_ADMIN_PASSWORD: "admin"
      GF_AUTH_ANONYMOUS_ENABLED: "false"
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
      - jaeger
      - loki

volumes:
  rag_data:
